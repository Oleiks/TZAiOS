spring.datasource.url=jdbc:h2:mem:library;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.flyway.enabled=false

library.security.jwt-secret=change-me-change-me-change-me-change-me
library.security.access-token-ttl=PT30M
library.security.refresh-token-ttl=P30D
library.openapi.base-url=https://openlibrary.org
library.cache.home-ttl=PT6H
library.cache.search-ttl=PT1H
library.cache.subject-ttl=PT6H
library.cache.book-ttl=PT24H
library.cache.author-ttl=PT168H
library.cache.stale-window=PT72H
