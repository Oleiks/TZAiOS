spring.application.name=library

spring.datasource.url=jdbc:postgresql://localhost:5433/db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

library.security.jwt-secret=change-me-change-me-change-me-change-me
library.security.access-token-ttl=PT30M
library.security.refresh-token-ttl=P30D

library.openapi.base-url=https://openlibrary.org
library.cache.home-ttl=PT6H
library.cache.search-ttl=PT1H
library.cache.subject-ttl=PT6H
library.cache.book-ttl=PT24H
library.cache.author-ttl=PT168H
library.cache.stale-window=PT72H
